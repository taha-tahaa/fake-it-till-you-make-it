# Local Windows environment (RTX GPU). Create with:
#   conda env create -f environment.yml
#   conda activate dlproj
# (On Colab just `pip install -r requirements.txt` — torch is preinstalled.)
name: dlproj
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      - --index-url https://download.pytorch.org/whl/cu121
      - --extra-index-url https://pypi.org/simple
      - torch==2.5.1
      - torchaudio==2.5.1
      - transformers>=4.46,<4.50
      - peft>=0.13,<0.16
      - kagglehub>=0.3
      - soundfile>=0.12
      - scipy>=1.10
      - scikit-learn>=1.3
      - numpy>=1.26
      - matplotlib>=3.7
      - pyyaml>=6.0
      - tqdm>=4.66
      - pytest>=8.0
